<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>observatory</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel2: #1c2230;
    --line: #21262d;
    --text: #e6edf3;
    --dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --amber: #d29922;
    --accent-soft: rgba(88, 166, 255, .12);
    --mono: "IBM Plex Mono", "Cascadia Mono", Consolas, monospace;
    --sans: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; overflow: hidden; }

  /* ---------- top tab bar ---------- */
  .topbar {
    height: 46px; display: flex; align-items: center; gap: 6px;
    padding: 0 14px; border-bottom: 1px solid var(--line); background: var(--panel);
    overflow-x: auto; white-space: nowrap;
  }
  .brand {
    font-size: 13px; font-weight: 600; letter-spacing: .14em;
    text-transform: uppercase; margin-right: 10px; flex: none;
  }
  .brand span { color: var(--accent); }
  .tab-btn {
    flex: none; background: transparent; border: 1px solid var(--line); border-radius: 999px;
    color: var(--dim); font-family: var(--sans); font-size: 12.5px; font-weight: 600;
    padding: 6px 14px; cursor: pointer; transition: all .15s;
  }
  .tab-btn:hover { color: var(--text); background: var(--panel2); }
  .tab-btn.active { color: #fff; background: var(--accent); border-color: var(--accent); }
  .tab-btn .kind {
    font-family: var(--mono); font-size: 9px; letter-spacing: .08em;
    color: var(--dim); margin-left: 6px; text-transform: uppercase;
  }
  .tab-btn.active .kind { color: rgba(255,255,255,.75); }
  .spacer { flex: 1; min-width: 12px; }
  .chip {
    flex: none; font-family: var(--mono); font-size: 10.5px; padding: 3px 8px;
    border-radius: 4px; border: 1px solid var(--line); color: var(--dim); letter-spacing: .05em;
  }
  .chip.on { border-color: rgba(63,185,80,.45); color: var(--green); }
  .chip.warn { border-color: rgba(210,153,34,.5); color: var(--amber); }

  /* ---------- layout ---------- */
  main { display: grid; grid-template-columns: minmax(340px, 42%) 1fr; height: calc(100% - 46px); }

  /* ---------- chat ---------- */
  #chat { display: flex; flex-direction: column; border-right: 1px solid var(--line); min-width: 0; }
  #messages { flex: 1; overflow-y: auto; padding: 16px 16px 8px; display: flex; flex-direction: column; gap: 10px; }
  .bubble {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 12px; max-width: 94%; line-height: 1.55; font-size: 13px;
    animation: rise .18s ease-out; white-space: pre-wrap; word-break: break-word;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(4px); } }
  .bubble.user { align-self: flex-end; background: var(--panel2); }
  .bubble .who {
    display: flex; align-items: center; gap: 6px; font-family: var(--mono);
    font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px;
  }
  .bubble .who .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); }
  .bubble.speaking .who .dot { background: var(--accent); animation: pulse 1s infinite; }
  .bubble.answer { border-color: rgba(88,166,255,.45); background: linear-gradient(180deg, var(--accent-soft), var(--panel)); }
  .bubble.err { border-color: rgba(248,81,73,.5); }
  .bubble.err .who .dot { background: var(--red); }
  .caret { display: inline-block; width: 7px; height: 13px; background: var(--accent); vertical-align: -2px; animation: pulse .8s infinite; }
  @keyframes pulse { 50% { opacity: .25; } }

  #composer { display: flex; gap: 8px; padding: 12px 14px 14px; border-top: 1px solid var(--line); }
  #q {
    flex: 1; min-width: 0; background: var(--panel2); border: 1px solid var(--line); border-radius: 6px;
    color: var(--text); padding: 10px 12px; font-family: var(--sans); font-size: 13px; outline: none;
  }
  #q:focus { border-color: var(--accent); }
  #send {
    background: var(--accent); color: #06121f; border: 0; border-radius: 6px; padding: 0 18px;
    font-weight: 600; font-size: 13px; cursor: pointer;
  }
  #send:disabled { opacity: .4; cursor: default; }

  /* approval bar for human-in-the-loop agents */
  #approve { display: none; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--line); background: var(--panel); }
  #approve.show { display: flex; }
  #approve button {
    flex: 1; border: 1px solid var(--line); background: var(--panel2); color: var(--text);
    border-radius: 6px; padding: 8px; font-size: 12.5px; font-weight: 600; cursor: pointer;
  }
  #approve button.ok { border-color: rgba(63,185,80,.5); color: var(--green); }
  #approve button.no { border-color: rgba(248,81,73,.5); color: var(--red); }

  /* ---------- observatory ---------- */
  #obs { display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
  #stage {
    min-height: 34px; display: flex; align-items: center; gap: 10px; padding: 0 14px;
    border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 11px; color: var(--dim);
  }
  #stage .live { color: var(--accent); }
  #graphWrap { flex: 1.25; min-height: 0; display: flex; align-items: center; justify-content: center; padding: 10px 0; overflow: auto; }
  #graphWrap svg { height: 100%; max-height: 100%; width: auto; max-width: 100%; }

  .node rect { fill: var(--panel); stroke: var(--line); stroke-width: 1.2; transition: all .25s; }
  .node text.lbl { fill: var(--dim); font: 600 12.5px var(--sans); transition: fill .25s; }
  .node text.role { fill: var(--dim); opacity: .65; font: 9.5px var(--mono); }
  .node .status { fill: var(--dim); opacity: .5; transition: all .25s; }
  .node.active rect { stroke: var(--accent); fill: var(--panel2); filter: drop-shadow(0 0 9px rgba(88,166,255,.5)); }
  .node.active text.lbl { fill: var(--text); }
  .node.active .status { fill: var(--accent); opacity: 1; animation: pulse .9s infinite; }
  .node.done rect { stroke: var(--line); fill: var(--panel2); }
  .node.done .status { fill: var(--green); opacity: 1; }
  .node.done text.lbl { fill: var(--text); }
  .node.tooling rect { stroke: var(--amber); filter: drop-shadow(0 0 9px rgba(210,153,34,.45)); }
  .node.tooling .status { fill: var(--amber); opacity: 1; }

  .edge { stroke: var(--line); stroke-width: 1.4; fill: none; transition: stroke .25s; }
  .edge.active { stroke: var(--accent); stroke-width: 2; stroke-dasharray: 6 5; animation: flow .5s linear infinite; }
  @keyframes flow { to { stroke-dashoffset: -11; } }
  .edge-lbl { fill: var(--dim); opacity: .7; font: 9.5px var(--mono); }
  marker path { fill: var(--line); }
  .node.endcap circle { fill: none; stroke: var(--line); stroke-width: 1.2; }
  .node.endcap text { fill: var(--dim); font: 9.5px var(--mono); }
  .node.endcap.done circle { stroke: var(--green); fill: rgba(63,185,80,.12); }
  .node.endcap.done text { fill: var(--green); }

  /* ---------- trace ---------- */
  #trace { flex: 1; min-height: 150px; border-top: 1px solid var(--line); overflow-y: auto; }
  #trace h2 {
    position: sticky; top: 0; background: var(--bg); font: 600 10px var(--mono); letter-spacing: .12em;
    color: var(--dim); padding: 8px 14px 6px; text-transform: uppercase; z-index: 2;
  }
  .trow {
    display: grid; grid-template-columns: 14px 1fr 70px 62px 62px; gap: 8px; align-items: center;
    padding: 5px 14px; font-family: var(--mono); font-size: 11.5px; color: var(--dim);
    border-left: 2px solid transparent;
  }
  .trow.active { color: var(--text); border-left-color: var(--accent); background: var(--accent-soft); }
  .trow.done .st { color: var(--green); }
  .trow .st { font-size: 10px; }
  .trow .num { text-align: right; font-variant-numeric: tabular-nums; color: var(--text); }
  .trow .tag { color: var(--dim); opacity: .8; font-size: 10px; text-align: right; }

  /* tool calls: the whole point, so they get real estate */
  .tool {
    margin: 3px 14px 3px 28px; border: 1px solid var(--line); border-left: 2px solid var(--amber);
    border-radius: 5px; background: var(--panel); font-family: var(--mono); font-size: 11px;
  }
  .tool summary {
    padding: 5px 9px; cursor: pointer; color: var(--text); display: flex;
    align-items: center; gap: 8px; list-style: none;
  }
  .tool summary::-webkit-details-marker { display: none; }
  .tool summary .nm { color: var(--amber); font-weight: 600; }
  .tool summary .arg { color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .tool summary .ms { color: var(--dim); font-variant-numeric: tabular-nums; }
  .tool .body { border-top: 1px solid var(--line); padding: 7px 9px; }
  .tool .body .k { color: var(--dim); font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase; display: block; margin-bottom: 3px; }
  .tool .body pre { white-space: pre-wrap; word-break: break-word; color: var(--text); margin-bottom: 8px; max-height: 260px; overflow: auto; }
  .tool .body pre:last-child { margin-bottom: 0; }
  .tool.running { border-left-color: var(--accent); }
  .tool.running summary .nm { color: var(--accent); }

  /* family cross-links live in the estate bar (eco-nav.js) — one bar, one list */

  /* ---------- desk lane (Marcus's recorded runs) ---------- */
  #deskList { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
  .desk-empty { color: var(--dim); font-size: 13px; line-height: 1.6; padding: 12px 4px; }
  .desk-empty a { color: var(--accent); }
  .desk-hint { color: var(--dim); font-family: var(--mono); font-size: 11px; }
  .drun {
    display: grid; grid-template-columns: 52px 46px 1fr 12px 44px 58px; gap: 8px; align-items: center;
    background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    padding: 8px 10px; font-family: var(--mono); font-size: 11.5px; color: var(--dim);
    cursor: pointer; transition: all .15s;
  }
  .drun:hover { border-color: var(--dim); color: var(--text); }
  .drun.sel { border-color: var(--accent); background: var(--accent-soft); color: var(--text); }
  .drun .tick { color: var(--text); font-weight: 600; }
  .drun .vchip {
    justify-self: start; border: 1px solid var(--line); border-radius: 4px;
    padding: 2px 6px; font-size: 10px; letter-spacing: .05em; color: var(--amber);
    border-color: rgba(210,153,34,.5); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%;
  }
  .drun .adot { width: 8px; height: 8px; border-radius: 50%; background: var(--panel2); border: 1px solid var(--line); }
  .drun .adot.on { background: var(--green); border-color: var(--green); }
  .drun .oc.bad { color: var(--red); }
  .drun .lat { text-align: right; font-variant-numeric: tabular-nums; }

  #deskOrder { display: none; align-items: flex-start; gap: 10px; padding: 12px 14px; border-top: 1px solid var(--line); background: var(--panel); }
  #deskOrder.show { display: flex; }
  #deskOrder .k { font: 600 10px var(--mono); letter-spacing: .12em; text-transform: uppercase; color: var(--dim); padding-top: 3px; }
  #deskOrder .line { flex: 1; font-family: var(--mono); font-size: 14.5px; line-height: 1.5; color: var(--text); word-break: break-word; user-select: all; }
  #deskOrder button {
    flex: none; border: 1px solid var(--line); background: var(--panel2); color: var(--text);
    border-radius: 6px; padding: 6px 12px; font-size: 11.5px; font-weight: 600; cursor: pointer;
  }
  #deskOrder button:hover { border-color: var(--accent); }

  /* voice agent card */
  #voiceCard { padding: 22px; color: var(--dim); font-size: 13px; line-height: 1.6; max-width: 620px; }
  #voiceCard h3 { color: var(--text); font-size: 15px; margin-bottom: 8px; }
  #voiceCard code { font-family: var(--mono); color: var(--accent); font-size: 12px; }
  #voiceCard .tools { margin-top: 12px; font-family: var(--mono); font-size: 11.5px; }
  #voiceCard .tools span { display: inline-block; border: 1px solid var(--line); background: var(--panel);
    border-radius: 4px; padding: 3px 7px; margin: 0 5px 5px 0; color: var(--text); }
  .hide { display: none !important; }
</style>
</head>
<body>
<!-- Estate bar: same tabs + sign-in state as every other b4rruf3t app. -->
<script src="https://auth.b4rruf3t.com/eco-nav.js" defer></script>
<nav class="topbar">
  <div class="brand">agent <span>observatory</span></div>
  <div id="tabs" style="display:flex;gap:4px"></div>
  <div class="spacer"></div>
  <div class="chip" id="chipLlm">...</div>
  <div class="chip" id="chipLs">langsmith</div>
  <div class="chip" id="chipRun">idle</div>
</nav>

<main>
  <section id="chat">
    <div id="messages"></div>
    <div id="deskList" class="hide"></div>
    <div id="approve">
      <button class="ok" data-action="approve">approve</button>
      <button data-action="revise">revise</button>
      <button class="no" data-action="reject">reject</button>
    </div>
    <div id="composer">
      <input id="q" placeholder="ask the agent something" />
      <button id="send">run</button>
    </div>
  </section>

  <section id="obs">
    <div id="stage"><span id="stageTxt">idle</span></div>
    <div id="graphWrap"></div>
    <div id="voiceCard" class="hide"></div>
    <div id="deskOrder"></div>
    <div id="trace"><h2>trace</h2><div id="trows"></div></div>
  </section>
</main>

<script src="/layout.js"></script>
<script>
const $ = (s) => document.querySelector(s);
const messages = $("#messages"), trows = $("#trows");

let AGENTS = [], AGENT = null, SPEC = null;
let bubbles = {}, traceRows = {}, runCount = {}, tools = {};
let activeNodes = new Set(), running = false, pendingThread = null;
let deskRuns = [], deskSel = null, deskTimer = null, deskReplay = 0;

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function escapeHtml(s) { return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;"); }
function scrollChat() { messages.scrollTop = messages.scrollHeight; }

/* ---------------- boot: the registry drives everything ---------------- */
async function init() {
  const data = await (await fetch("/api/agents")).json();
  AGENTS = data.agents;
  setMode(data.mode);
  const tabs = $("#tabs");
  for (const a of AGENTS) {
    const b = el("button", "tab-btn",
      `${escapeHtml(a.label)}<span class="kind">${a.kind}</span>`);
    b.title = a.tagline;
    b.addEventListener("click", () => select(a.id));
    b.dataset.id = a.id;
    tabs.appendChild(b);
  }
  select(data.default);
}

function select(id) {
  if (running) return;
  AGENT = AGENTS.find((a) => a.id === id) || AGENTS[0];
  document.querySelectorAll(".tab-btn").forEach((b) =>
    b.classList.toggle("active", b.dataset.id === AGENT.id));
  stopDesk();
  messages.innerHTML = "";
  trows.innerHTML = "";
  pendingThread = null;
  $("#approve").classList.remove("show");
  addBubble("observatory", AGENT.tagline);

  const isVoice = AGENT.kind === "voice";
  const isDesk = AGENT.kind === "desk";
  $("#graphWrap").classList.toggle("hide", isVoice);
  $("#voiceCard").classList.toggle("hide", !isVoice);
  $("#composer").classList.toggle("hide", isVoice || isDesk);
  $("#trace").classList.toggle("hide", isVoice);
  $("#messages").classList.toggle("hide", isDesk);
  $("#deskList").classList.toggle("hide", !isDesk);

  if (isDesk) { startDesk(); SPEC = null; return; }
  if (isVoice) { renderVoice(AGENT); SPEC = null; return; }

  SPEC = AGENT.spec;
  $("#q").placeholder = AGENT.placeholder || "ask the agent something";
  $("#q").value = AGENT.placeholder || "";
  // The DAG is drawn from the backend's real topology by the shared layout
  // module, so the picture can never drift from the compiled graph.
  $("#graphWrap").innerHTML = ObsLayout.renderSvg(SPEC, { direction: "TB" });
  $("#stageTxt").textContent = "idle";
}

function renderVoice(a) {
  $("#voiceCard").innerHTML = `
    <h3>${escapeHtml(a.label)}</h3>
    <p>${escapeHtml(a.tagline)}</p>
    <p style="margin-top:10px">Realtime voice agent, OpenAI voice <code>${escapeHtml(a.voice)}</code>.
    Its tools run server-side on this host via <code>POST /api/tool/${escapeHtml(a.id)}</code>,
    so data and side effects never leave the backend.</p>
    <div class="tools">${(a.tools || []).map((t) => `<span>${escapeHtml(t)}</span>`).join("")}</div>
    <p style="margin-top:14px">The browser WebRTC bridge to the Realtime API is not wired up in
    this build: the persona, its tool schemas and its server-side implementations are hosted and
    callable, but there is no microphone session yet.</p>`;
}

/* ---------------- the desk lane: Marcus's recorded decisions ----------------
   Not chat-runnable: runs are POSTed by ai-trading-desk whenever someone talks
   to Marcus on desk.b4rruf3t.com. The lane lists them and replays a clicked
   run through the same DAG renderer the live agents use, paced by the
   recorded per-node timings scaled to about two seconds. */

function stopDesk() {
  if (deskTimer) { clearInterval(deskTimer); deskTimer = null; }
  deskReplay++;                       // cancels any in-flight replay
  deskRuns = []; deskSel = null;
  $("#deskOrder").classList.remove("show");
}

async function startDesk() {
  $("#deskList").innerHTML = "";
  $("#graphWrap").innerHTML =
    `<div class="desk-hint">select a run on the left to replay the decision</div>`;
  $("#stageTxt").textContent = "waiting for desk runs";
  await refreshDesk();
  deskTimer = setInterval(refreshDesk, 20000);
}

async function refreshDesk() {
  let data;
  try { data = await (await fetch("/api/desk/runs?limit=50")).json(); }
  catch { return; }
  if (AGENT?.kind !== "desk") return;          // switched away mid-fetch
  const runs = data.runs || [];
  const list = $("#deskList");
  if (!runs.length) {
    list.innerHTML = `<div class="desk-empty">no desk runs yet - runs land here
      live whenever someone talks to Marcus on
      <a href="https://desk.b4rruf3t.com">desk.b4rruf3t.com</a></div>`;
    deskRuns = [];
    return;
  }
  if (!deskRuns.length) list.innerHTML = "";   // clear the empty state
  const known = new Set(deskRuns.map((r) => r.id));
  // Oldest new run first, so prepending keeps the list newest-first without
  // touching existing rows: the selection never moves under the user.
  runs.filter((r) => !known.has(r.id)).reverse().forEach((r) => {
    list.prepend(deskRow(r));
    deskRuns.unshift(r);
  });
}

function deskRow(r) {
  const t = new Date(r.received_at);
  const hhmm = isNaN(t) ? "?" :
    `${String(t.getHours()).padStart(2, "0")}:${String(t.getMinutes()).padStart(2, "0")}`;
  const row = el("div", "drun");
  row.dataset.id = r.id;
  row.title = r.order_line || "";
  row.innerHTML =
    `<span class="when">${hhmm}</span>` +
    `<span class="tick">${escapeHtml(r.ticker || "?")}</span>` +
    `<span class="vchip">${escapeHtml(r.verdict || "-")}</span>` +
    `<span class="adot${r.armed ? " on" : ""}" title="${r.armed ? "armed" : "not armed"}"></span>` +
    `<span class="oc${r.outcome === "ok" ? "" : " bad"}">${escapeHtml(r.outcome || "")}</span>` +
    `<span class="lat">${Number(r.latency_ms) || 0} ms</span>`;
  row.addEventListener("click", () => selectDeskRun(r.id));
  return row;
}

async function selectDeskRun(id) {
  deskSel = id;
  document.querySelectorAll(".drun").forEach((r) =>
    r.classList.toggle("sel", Number(r.dataset.id) === id));
  let run;
  try { run = await (await fetch("/api/desk/runs/" + id)).json(); }
  catch { return; }
  if (AGENT?.kind !== "desk" || deskSel !== id) return;
  replayDeskRun(run);
}

/* The stored spec uses edge pairs [["a","b"]]; the layout module wants
   {from,to}. When a record carries no spec at all, derive a linear one from
   the node sequence so old records still draw. */
function deskSpec(rec) {
  const nodes = rec.nodes || [];
  const s = rec.spec && (rec.spec.nodes || []).length ? rec.spec : {
    nodes: nodes.map((n) => ({ id: n.node, label: n.node })),
    edges: nodes.slice(1).map((n, i) => [nodes[i].node, n.node]),
  };
  return {
    nodes: (s.nodes || []).map((n) => typeof n === "string" ? { id: n }
      : { id: n.id, label: n.label || n.id, role: n.hint || "" }),
    edges: (s.edges || []).map((e) => Array.isArray(e)
      ? { from: e[0], to: e[1] } : e),
  };
}

async function replayDeskRun(run) {
  const my = ++deskReplay;
  const rec = run.record || {};
  SPEC = deskSpec(rec);
  $("#graphWrap").innerHTML = ObsLayout.renderSvg(SPEC, { direction: "TB" });
  trows.innerHTML = "";
  $("#deskOrder").classList.remove("show");

  const nodes = rec.nodes || [];
  const totalMs = nodes.reduce((s, n) => s + Math.max(1, Number(n.ms) || 1), 0);
  const scale = totalMs ? 2000 / totalMs : 0;   // whole replay ~ 2 seconds
  $("#stageTxt").innerHTML =
    `<span class="live">replaying</span>&nbsp; ${escapeHtml(rec.ticker || "")} · ${escapeHtml(rec.started_at || "")}`;

  for (let i = 0; i < nodes.length; i++) {
    if (my !== deskReplay) return;              // superseded or tab switched
    const n = nodes[i];
    const svgNode = nodeEl(n.node);
    if (svgNode) { svgNode.classList.remove("done"); svgNode.classList.add("active"); }
    const edge = i > 0 &&
      document.getElementById("e-" + nodes[i - 1].node + "-" + n.node);
    if (edge) edge.classList.add("active");

    const row = el("div", "trow active");
    row.innerHTML =
      `<span class="st">&#9654;</span><span>${escapeHtml(n.node)} · ${escapeHtml(n.note || "")}</span>` +
      `<span></span><span class="num">${Number(n.ms) || 0} ms</span><span class="tag">recorded</span>`;
    trows.appendChild(row);
    row.scrollIntoView({ block: "nearest" });

    await sleep(Math.max(80, (Number(n.ms) || 1) * scale));
    if (my !== deskReplay) return;
    if (svgNode) { svgNode.classList.remove("active"); svgNode.classList.add("done"); }
    if (edge) edge.classList.remove("active");
    row.className = "trow done";
    row.querySelector(".st").innerHTML = "&#10003;";
    row.querySelector(".tag").textContent = "done";
  }

  document.getElementById("endcap")?.classList.add("done");
  $("#stageTxt").textContent =
    `${rec.ticker || ""} · ${rec.verdict || "-"} · ${rec.armed ? "armed" : "not armed"} · ${Number(rec.latency_ms) || 0} ms`;
  showDeskOrder(rec.order || run.order_line || "");
}

function showDeskOrder(text) {
  const box = $("#deskOrder");
  box.innerHTML =
    `<span class="k">order</span><div class="line">${escapeHtml(text || "(no order line)")}</div>` +
    `<button id="copyOrder">copy</button>`;
  box.classList.add("show");
  $("#copyOrder").addEventListener("click", async () => {
    try { await navigator.clipboard.writeText(text); } catch { return; }
    const b = $("#copyOrder");
    b.textContent = "copied";
    setTimeout(() => { const x = $("#copyOrder"); if (x) x.textContent = "copy"; }, 1200);
  });
}

function setMode(m) {
  const c = $("#chipLlm");
  if (m.llm === "demo") { c.textContent = "demo mode"; c.className = "chip warn"; }
  else { c.textContent = "live · openai"; c.className = "chip on"; }
  $("#chipLs").className = "chip" + (m.langsmith ? " on" : "");
}

/* ---------------- frame handlers ---------------- */
function nodeEl(id) { return document.getElementById("n-" + id); }
function labelOf(id) { return (SPEC?.nodes || []).find((n) => n.id === id)?.label || id; }

function setStage() {
  const t = $("#stageTxt");
  if (!running) { t.textContent = "idle"; return; }
  if (activeNodes.size === 0) { t.textContent = "routing..."; return; }
  t.innerHTML = [...activeNodes]
    .map((n) => `<span class="live">&#9679; ${escapeHtml(n)}</span>`).join("&nbsp;&nbsp;");
}

function addBubble(who, text, cls) {
  const b = el("div", "bubble" + (cls ? " " + cls : ""));
  b.innerHTML = `<div class="who"><span class="dot"></span>${escapeHtml(who)}</div>` + escapeHtml(text);
  messages.appendChild(b); scrollChat();
  return b;
}

function onNodeStart(ev) {
  const id = ev.node;
  runCount[id] = (runCount[id] || 0) + 1;
  activeNodes.add(id); setStage();
  const n = nodeEl(id);
  if (n) { n.classList.remove("done"); n.classList.add("active"); }
  (SPEC?.edges || []).filter((e) => e.to === id)
    .forEach((e) => document.getElementById("e-" + e.from + "-" + e.to)?.classList.add("active"));

  const rev = runCount[id] > 1 ? ` · pass ${runCount[id]}` : "";
  const b = el("div", "bubble speaking");
  b.innerHTML = `<div class="who"><span class="dot"></span>${escapeHtml(labelOf(id))}${rev}</div>` +
    `<span class="txt"></span><span class="caret"></span>`;
  messages.appendChild(b); scrollChat();
  bubbles[id] = b;

  const row = el("div", "trow active");
  row.innerHTML = `<span class="st">&#9654;</span><span>${escapeHtml(id)}${rev}</span>
    <span class="num tok">0 tok</span><span class="num ms">...</span><span class="tag">running</span>`;
  trows.appendChild(row);
  traceRows[id] = { row, t0: performance.now(), tokens: 0 };
  row.scrollIntoView({ block: "nearest" });
}

function onToken(ev) {
  const b = bubbles[ev.node];
  if (b) { b.querySelector(".txt").textContent += ev.text; scrollChat(); }
  const tr = traceRows[ev.node];
  if (tr) { tr.tokens++; tr.row.querySelector(".tok").textContent = tr.tokens + " tok"; }
}

function onNodeEnd(ev) {
  const id = ev.node;
  activeNodes.delete(id); setStage();
  const n = nodeEl(id);
  if (n) { n.classList.remove("active", "tooling"); n.classList.add("done"); }
  (SPEC?.edges || []).filter((e) => e.to === id)
    .forEach((e) => document.getElementById("e-" + e.from + "-" + e.to)?.classList.remove("active"));
  const b = bubbles[id];
  if (b) {
    b.classList.remove("speaking");
    b.querySelector(".caret")?.remove();
    if (!b.querySelector(".txt").textContent.trim()) b.remove();
  }
  const tr = traceRows[id];
  if (tr) {
    tr.row.className = "trow done";
    tr.row.querySelector(".st").innerHTML = "&#10003;";
    tr.row.querySelector(".ms").textContent = Math.round(performance.now() - tr.t0) + " ms";
    tr.row.querySelector(".tag").textContent = "done";
  }
}

/* Tool calls: shown as they happen, with arguments, then filled in with the
   result. This is what the observatory exists to make visible. */
function onToolStart(ev) {
  const node = nodeEl(ev.node);
  if (node) node.classList.add("tooling");
  const d = el("details", "tool running");
  d.innerHTML =
    `<summary><span class="nm">${escapeHtml(ev.tool)}</span>` +
    `<span class="arg">${escapeHtml(ev.args)}</span><span class="ms">...</span></summary>` +
    `<div class="body"><span class="k">arguments</span><pre>${escapeHtml(ev.args)}</pre>` +
    `<span class="k">result</span><pre class="out">running...</pre></div>`;
  trows.appendChild(d);
  tools[ev.id] = d;
  d.scrollIntoView({ block: "nearest" });
}

function onToolEnd(ev) {
  const node = nodeEl(ev.node);
  if (node) node.classList.remove("tooling");
  const d = tools[ev.id];
  if (!d) return;
  d.classList.remove("running");
  d.querySelector(".ms").textContent = ev.ms == null ? "" : ev.ms + " ms";
  d.querySelector(".out").textContent = ev.output ?? "";
}

function onRoute(ev) {
  const e = document.getElementById("e-" + ev.from + "-" + ev.to);
  if (e) { e.classList.add("active"); setTimeout(() => e.classList.remove("active"), 1600); }
  if (ev.to === "end") document.getElementById("endcap")?.classList.add("done");
  trows.appendChild(el("div", "trow done",
    `<span class="st">&#8618;</span><span>route ${escapeHtml(ev.from)} &rarr; ${escapeHtml(ev.to)}</span>
     <span></span><span></span><span class="tag">${escapeHtml(ev.decision || "")}</span>`));
}

function onInterrupt(ev) {
  pendingThread = ev.thread;
  const memo = ev.payload?.memo ?? ev.payload;
  addBubble("human approval required", JSON.stringify(memo, null, 2), "answer");
  $("#approve").classList.add("show");
  finishRun("awaiting approval");
}

function onRunEnd(ev) {
  document.getElementById("endcap")?.classList.add("done");
  addBubble("final answer", ev.answer || "(empty)", "answer");
  finishRun("idle");
}

function finishRun(stageText) {
  running = false;
  activeNodes.clear();
  $("#stageTxt").textContent = stageText;
  $("#chipRun").textContent = "idle"; $("#chipRun").className = "chip";
  $("#send").disabled = false;
}

const HANDLERS = {
  run_start: (ev) => setMode(ev.mode),
  node_start: onNodeStart,
  node_end: onNodeEnd,
  token: onToken,
  tool_start: onToolStart,
  tool_end: onToolEnd,
  route: onRoute,
  interrupt: onInterrupt,
  run_end: onRunEnd,
  error: (ev) => { addBubble("error", ev.message, "err"); finishRun("error"); },
};

/* ---------------- the run loop ---------------- */
function resetRun() {
  bubbles = {}; traceRows = {}; runCount = {}; tools = {}; activeNodes = new Set();
  trows.innerHTML = "";
  document.querySelectorAll(".node").forEach((n) => n.classList.remove("active", "done", "tooling"));
  document.querySelectorAll(".edge").forEach((e) => e.classList.remove("active"));
}

async function drain(res) {
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    let i;
    while ((i = buf.indexOf("\n\n")) >= 0) {
      const line = buf.slice(0, i).trim(); buf = buf.slice(i + 2);
      if (!line.startsWith("data: ")) continue;
      let ev;
      try { ev = JSON.parse(line.slice(6)); } catch { continue; }
      HANDLERS[ev.type]?.(ev);
    }
  }
}

async function startRun(url, body, echo) {
  running = true;
  resetRun();
  $("#send").disabled = true;
  $("#approve").classList.remove("show");
  $("#chipRun").textContent = "running"; $("#chipRun").className = "chip warn";
  if (echo) addBubble("you", echo, "user");
  try {
    await drain(await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    }));
  } catch (err) {
    addBubble("error", String(err), "err");
  }
  if (running) finishRun("idle");
}

function run() {
  const q = $("#q").value.trim();
  if (!q || running || !AGENT || AGENT.kind !== "text") return;
  startRun("/api/chat", { question: q, agent: AGENT.id }, q);
}

$("#send").addEventListener("click", run);
$("#q").addEventListener("keydown", (e) => { if (e.key === "Enter") run(); });
$("#approve").addEventListener("click", (e) => {
  const action = e.target.dataset.action;
  if (!action || !pendingThread) return;
  const notes = action === "revise" ? (prompt("what should change?") || "") : "";
  startRun("/api/resume",
    { agent: AGENT.id, thread: pendingThread, action, notes }, action);
  pendingThread = null;
});

init();
</script>
