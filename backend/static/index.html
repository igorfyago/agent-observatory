<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Observatory</title>
<style>
  :root {
    --bg: #0d0f13;
    --panel: #12151b;
    --panel-2: #161a22;
    --line: #232936;
    --text: #d6dae3;
    --dim: #7d8595;
    --faint: #4a5160;
    --accent: #e8a33d;          /* single accent — amber */
    --accent-soft: rgba(232, 163, 61, .14);
    --ok: #4cc38a;
    --err: #e5534b;
    --mono: "IBM Plex Mono", "Cascadia Mono", Consolas, monospace;
    --sans: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; overflow: hidden; }

  /* ---------- header ---------- */
  header {
    height: 46px; display: flex; align-items: center; gap: 14px;
    padding: 0 16px; border-bottom: 1px solid var(--line); background: var(--panel);
  }
  header h1 { font-size: 13px; font-weight: 600; letter-spacing: .14em; color: var(--text); }
  header h1 span { color: var(--accent); }
  .chip {
    font-family: var(--mono); font-size: 10.5px; padding: 3px 8px; border-radius: 4px;
    border: 1px solid var(--line); color: var(--dim); letter-spacing: .05em;
  }
  .chip.on { border-color: rgba(76,195,138,.4); color: var(--ok); }
  .chip.warn { border-color: rgba(232,163,61,.45); color: var(--accent); }
  .spacer { flex: 1; }

  /* ---------- layout ---------- */
  main { display: grid; grid-template-columns: minmax(360px, 45%) 1fr; height: calc(100% - 46px); }

  /* ---------- chat ---------- */
  #chat { display: flex; flex-direction: column; border-right: 1px solid var(--line); min-width: 0; }
  #messages { flex: 1; overflow-y: auto; padding: 18px 18px 8px; display: flex; flex-direction: column; gap: 10px; }
  .bubble {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 12px; max-width: 92%; line-height: 1.55; font-size: 13px;
    animation: rise .18s ease-out;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(4px); } }
  .bubble.user { align-self: flex-end; background: var(--panel-2); border-color: #2a3140; }
  .bubble .who {
    display: flex; align-items: center; gap: 6px; font-family: var(--mono);
    font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px;
  }
  .bubble .who .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); }
  .bubble.speaking .who .dot { background: var(--accent); animation: pulse 1s infinite; }
  .bubble.answer { border-color: rgba(232,163,61,.5); background: linear-gradient(180deg, var(--accent-soft), var(--panel)); }
  .caret { display: inline-block; width: 7px; height: 13px; background: var(--accent); vertical-align: -2px; animation: pulse .8s infinite; }
  @keyframes pulse { 50% { opacity: .25; } }

  #composer { display: flex; gap: 8px; padding: 12px 16px 16px; border-top: 1px solid var(--line); }
  #q {
    flex: 1; background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px;
    color: var(--text); padding: 10px 12px; font-family: var(--sans); font-size: 13px; outline: none;
  }
  #q:focus { border-color: var(--accent); }
  #send {
    background: var(--accent); color: #14100a; border: 0; border-radius: 6px; padding: 0 18px;
    font-weight: 600; font-size: 13px; cursor: pointer;
  }
  #send:disabled { opacity: .4; cursor: default; }

  /* ---------- observatory ---------- */
  #obs { display: flex; flex-direction: column; min-width: 0; background: radial-gradient(1200px 500px at 70% -10%, #151a24 0%, var(--bg) 60%); }
  #stage {
    height: 34px; display: flex; align-items: center; gap: 10px; padding: 0 16px;
    border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 11px; color: var(--dim);
  }
  #stage .live { color: var(--accent); }
  #graphWrap { flex: 1.35; min-height: 0; display: flex; align-items: center; justify-content: center; padding: 8px 0; }
  svg { height: 100%; max-height: 520px; width: auto; }

  .node rect { fill: var(--panel); stroke: var(--line); stroke-width: 1.2; rx: 9; transition: all .25s; }
  .node text.lbl { fill: var(--dim); font: 600 13px var(--sans); transition: fill .25s; }
  .node text.role { fill: var(--faint); font: 9.5px var(--mono); }
  .node .status { fill: var(--faint); transition: fill .25s; }
  .node.active rect { stroke: var(--accent); fill: #1a1710; filter: drop-shadow(0 0 10px rgba(232,163,61,.55)); }
  .node.active text.lbl { fill: var(--text); }
  .node.active .status { fill: var(--accent); animation: pulse .9s infinite; }
  .node.done rect { stroke: #33507f00; stroke: var(--line); fill: #131a16; }
  .node.done .status { fill: var(--ok); }
  .node.done text.lbl { fill: var(--text); }

  .edge { stroke: var(--line); stroke-width: 1.4; fill: none; transition: stroke .25s; }
  .edge.loop { stroke-dasharray: 4 4; }
  .edge.active { stroke: var(--accent); stroke-width: 2; stroke-dasharray: 6 5; animation: flow .5s linear infinite; }
  @keyframes flow { to { stroke-dashoffset: -11; } }
  .edge-lbl { fill: var(--faint); font: 9.5px var(--mono); }
  marker path { fill: var(--line); }
  #endcap circle { fill: none; stroke: var(--line); stroke-width: 1.2; }
  #endcap.done circle { stroke: var(--ok); fill: rgba(76,195,138,.12); }
  #endcap text { fill: var(--faint); font: 9.5px var(--mono); }
  #endcap.done text { fill: var(--ok); }

  /* ---------- trace ---------- */
  #trace { flex: 1; min-height: 130px; border-top: 1px solid var(--line); overflow-y: auto; }
  #trace h2 {
    position: sticky; top: 0; background: var(--bg); font: 600 10px var(--mono); letter-spacing: .12em;
    color: var(--dim); padding: 8px 16px 6px; text-transform: uppercase;
  }
  .trow {
    display: grid; grid-template-columns: 14px 1fr 74px 64px 70px; gap: 8px; align-items: center;
    padding: 5px 16px; font-family: var(--mono); font-size: 11.5px; color: var(--dim);
    border-left: 2px solid transparent;
  }
  .trow.active { color: var(--text); border-left-color: var(--accent); background: var(--accent-soft); }
  .trow.done .st { color: var(--ok); }
  .trow .st { font-size: 10px; }
  .trow .num { text-align: right; font-variant-numeric: tabular-nums; color: var(--text); }
  .trow .tag { color: var(--faint); font-size: 10px; }
</style>
</head>
<body>
<header>
  <h1>AGENT <span>OBSERVATORY</span></h1>
  <div class="spacer"></div>
  <div class="chip" id="chipLlm">…</div>
  <div class="chip" id="chipLs">LANGSMITH</div>
  <div class="chip" id="chipRun">IDLE</div>
</header>

<main>
  <section id="chat">
    <div id="messages">
      <div class="bubble">
        <div class="who"><span class="dot"></span>observatory</div>
        Ask the team something — the pipeline on the right lights up live as each agent works.
        Runs keyless in demo mode; add an <b>OPENAI_API_KEY</b> to <b>.env</b> for real inference.
      </div>
    </div>
    <div id="composer">
      <input id="q" value="Should we adopt a graph-based multi-agent architecture for our pipeline?" />
      <button id="send">Run</button>
    </div>
  </section>

  <section id="obs">
    <div id="stage"><span id="stageTxt">pipeline idle</span></div>
    <div id="graphWrap">
      <svg viewBox="0 0 430 545" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0,0.5 L7.5,4 L0,7.5 z"/>
          </marker>
        </defs>
        <!-- edges (drawn first, under nodes) -->
        <path class="edge" id="e-supervisor-researcher" d="M178,95 L130,162" marker-end="url(#arr)"/>
        <path class="edge" id="e-supervisor-analyst"    d="M242,95 L290,162" marker-end="url(#arr)"/>
        <path class="edge" id="e-researcher-writer"     d="M130,215 L178,282" marker-end="url(#arr)"/>
        <path class="edge" id="e-analyst-writer"        d="M290,215 L242,282" marker-end="url(#arr)"/>
        <path class="edge" id="e-writer-critic"         d="M210,330 L210,382" marker-end="url(#arr)"/>
        <path class="edge loop" id="e-critic-writer"    d="M278,405 C360,405 360,308 280,306" marker-end="url(#arr)"/>
        <path class="edge" id="e-critic-end"            d="M210,430 L210,477" marker-end="url(#arr)"/>
        <text class="edge-lbl" x="345" y="362">revise</text>
        <text class="edge-lbl" x="218" y="458">approve</text>
        <!-- nodes injected by JS into this group -->
        <g id="nodes"></g>
        <g id="endcap" transform="translate(210,502)">
          <circle r="20"/>
          <text text-anchor="middle" dy="3.5">done</text>
        </g>
      </svg>
    </div>
    <div id="trace"><h2>Trace — top-down</h2><div id="trows"></div></div>
  </section>
</main>

<script>
const NODE_POS = {
  supervisor: [210, 72],
  researcher: [110, 190],
  analyst:    [310, 190],
  writer:     [210, 307],
  critic:     [210, 407],
};

const $ = (s) => document.querySelector(s);
const messages = $("#messages"), trows = $("#trows");
let SPEC = null, bubbles = {}, traceRows = {}, runCount = {}, activeNodes = new Set(), running = false;

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

/* ---- build DAG nodes from the real graph spec ---- */
async function init() {
  const r = await fetch("/api/graph");
  const data = await r.json();
  SPEC = data.spec;
  setMode(data.mode);
  const g = $("#nodes");
  for (const n of SPEC.nodes) {
    const [cx, cy] = NODE_POS[n.id];
    const grp = document.createElementNS("http://www.w3.org/2000/svg", "g");
    grp.setAttribute("class", "node");
    grp.id = "n-" + n.id;
    grp.innerHTML = `
      <rect x="${cx-66}" y="${cy-24}" width="132" height="48" rx="9"/>
      <circle class="status" cx="${cx-52}" cy="${cy-8}" r="3.5"/>
      <text class="lbl" x="${cx-42}" y="${cy-3}">${n.label}</text>
      <text class="role" x="${cx-52}" y="${cy+13}">${n.role}</text>`;
    g.appendChild(grp);
  }
}
function setMode(m) {
  const c = $("#chipLlm");
  if (m.llm === "demo") { c.textContent = "DEMO MODE"; c.className = "chip warn"; }
  else { c.textContent = "LIVE · OPENAI"; c.className = "chip on"; }
  $("#chipLs").className = "chip" + (m.langsmith ? " on" : "");
}

/* ---- UI state transitions ---- */
function nodeEl(id) { return $("#n-" + id); }
function setStage() {
  const t = $("#stageTxt");
  if (!running) { t.innerHTML = "pipeline idle"; return; }
  if (activeNodes.size === 0) { t.innerHTML = "routing…"; return; }
  t.innerHTML = [...activeNodes].map(n => `<span class="live">&#9679; ${n}</span>`).join("&nbsp;&nbsp;") + "&nbsp; speaking…";
}
function edgesInto(id) {
  return SPEC.edges.filter(e => e.to === id).map(e => $("#e-" + e.from + "-" + e.to)).filter(Boolean);
}

function onNodeStart(ev) {
  const id = ev.node;
  runCount[id] = (runCount[id] || 0) + 1;
  activeNodes.add(id); setStage();
  const n = nodeEl(id); n.classList.remove("done"); n.classList.add("active");
  edgesInto(id).forEach(e => e.classList.add("active"));

  // chat bubble for this speaking turn
  const label = SPEC.nodes.find(n => n.id === id)?.label || id;
  const rev = runCount[id] > 1 ? ` · rev ${runCount[id]}` : "";
  const b = el("div", "bubble speaking");
  b.innerHTML = `<div class="who"><span class="dot"></span>${label}${rev}</div><span class="txt"></span><span class="caret"></span>`;
  messages.appendChild(b); scrollChat();
  bubbles[id] = b;

  // trace row
  const row = el("div", "trow active");
  row.innerHTML = `<span class="st">&#9654;</span><span>${id}${rev.replace("·","&middot;")}</span>
    <span class="num tok">0 tok</span><span class="num ms">…</span><span class="tag">running</span>`;
  trows.appendChild(row);
  traceRows[id] = { row, t0: performance.now(), tokens: 0 };
  row.scrollIntoView({ block: "nearest" });
}

function onToken(ev) {
  const b = bubbles[ev.node];
  if (b) { b.querySelector(".txt").textContent += ev.text; scrollChat(); }
  const tr = traceRows[ev.node];
  if (tr) { tr.tokens++; tr.row.querySelector(".tok").textContent = tr.tokens + " tok"; }
}

function onNodeEnd(ev) {
  const id = ev.node;
  activeNodes.delete(id); setStage();
  const n = nodeEl(id); n.classList.remove("active"); n.classList.add("done");
  edgesInto(id).forEach(e => e.classList.remove("active"));
  const b = bubbles[id];
  if (b) { b.classList.remove("speaking"); b.querySelector(".caret")?.remove(); }
  const tr = traceRows[id];
  if (tr) {
    const ms = Math.round(performance.now() - tr.t0);
    tr.row.className = "trow done";
    tr.row.querySelector(".st").innerHTML = "&#10003;";
    tr.row.querySelector(".ms").textContent = ms.toLocaleString() + " ms";
    tr.row.querySelector(".tag").textContent = "done";
  }
}

function onRoute(ev) {
  const edge = $("#e-critic-" + (ev.to === "end" ? "end" : "writer"));
  if (edge) { edge.classList.add("active"); setTimeout(() => edge.classList.remove("active"), 1600); }
  if (ev.to === "end") $("#endcap").classList.add("done");
}

function onRunEnd(ev) {
  running = false; setStage();
  $("#chipRun").textContent = "IDLE"; $("#chipRun").className = "chip";
  const b = el("div", "bubble answer");
  b.innerHTML = `<div class="who"><span class="dot" style="background:var(--accent)"></span>final answer · ${ev.revisions} draft(s)</div>${escapeHtml(ev.answer)}`;
  messages.appendChild(b); scrollChat();
  $("#send").disabled = false;
}

function escapeHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function scrollChat() { messages.scrollTop = messages.scrollHeight; }

function resetRun() {
  bubbles = {}; traceRows = {}; runCount = {}; activeNodes = new Set();
  trows.innerHTML = "";
  document.querySelectorAll(".node").forEach(n => n.classList.remove("active", "done"));
  document.querySelectorAll(".edge").forEach(e => e.classList.remove("active"));
  $("#endcap").classList.remove("done");
}

/* ---- run ---- */
async function run() {
  const q = $("#q").value.trim();
  if (!q || running) return;
  running = true; resetRun();
  $("#send").disabled = true;
  $("#chipRun").textContent = "RUNNING"; $("#chipRun").className = "chip warn";
  const u = el("div", "bubble user", escapeHtml(q));
  messages.appendChild(u); scrollChat();

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ question: q }),
  });
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    let i;
    while ((i = buf.indexOf("\n\n")) >= 0) {
      const line = buf.slice(0, i).trim(); buf = buf.slice(i + 2);
      if (!line.startsWith("data: ")) continue;
      const ev = JSON.parse(line.slice(6));
      if (ev.type === "node_start") onNodeStart(ev);
      else if (ev.type === "token") onToken(ev);
      else if (ev.type === "node_end") onNodeEnd(ev);
      else if (ev.type === "route") onRoute(ev);
      else if (ev.type === "run_end") onRunEnd(ev);
      else if (ev.type === "run_start") setMode(ev.mode);
      else if (ev.type === "error") {
        running = false; $("#send").disabled = false;
        messages.appendChild(el("div", "bubble", `<div class="who"><span class="dot" style="background:var(--err)"></span>error</div>${escapeHtml(ev.message)}`));
      }
    }
  }
}

$("#send").addEventListener("click", run);
$("#q").addEventListener("keydown", (e) => { if (e.key === "Enter") run(); });
init();
</script>
</body>
</html>
